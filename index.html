    --text-primary: #f0f2f7;
    --text-secondary: #8b91a8;
    --text-muted: #545970;

    --accent-red: #ff5c5c;
    --accent-amber: #f5a623;
    --accent-purple: #9b7cf8;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  .header { padding: 2rem 1.5rem 1.5rem; max-width: 1100px; margin: 0 auto; }
  .header-top { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
  .header h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em; color: var(--text-primary); }
  .header h1 span { color: var(--accent-blue); }
  .header-meta { font-size: 0.78rem; color: var(--text-muted); }
  .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.75rem; }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border-light);
    background: transparent; color: var(--text-secondary); font-size: 0.8rem;
    cursor: pointer; transition: all 0.18s; font-family: inherit;
  }
  .filter-btn:hover { background: var(--card); color: var(--text-primary); }
  .filter-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }

  .search-bar { flex: 1; min-width: 160px; max-width: 260px; }
  .search-bar input {
    width: 100%; padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border-light); background: var(--surface);
    color: var(--text-primary); font-size: 0.8rem; font-family: inherit; outline: none;
  }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-bar input:focus { border-color: var(--accent-blue); }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; }
  .stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat-value { font-size: 1.3rem; font-weight: 600; color: var(--text-primary); }
  .stat-value.green { color: var(--accent-green); }
  .stat-value.red { color: var(--accent-red); }
  .stat-value.blue { color: var(--accent-blue); }

  .section-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 0 0 0.6rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .month-section { margin-bottom: 2rem; }
  
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }

  .earning-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .earning-card:hover { border-color: var(--border-light); background: var(--card-hover); }
  .earning-card.reported { opacity: 0.65; }
  .earning-card.reported .card-badge { background: rgba(255,255,255,0.06); color: var(--text-muted); }

  .card-main { padding: 1.1rem 1.2rem 0.9rem; }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; }
  .company-info { display: flex; align-items: center; gap: 10px; }
  .logo { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; flex-shrink: 0; }
  .company-name { font-size: 0.92rem; font-weight: 600; color: var(--text-primary); }
  .company-ticker { font-size: 0.73rem; color: var(--text-muted); margin-top: 1px; }
  .card-badge {
    font-size: 0.7rem; padding: 3px 9px; border-radius: 10px;
    font-weight: 500; white-space: nowrap;
  }
  .badge-upcoming { background: rgba(74,140,255,0.15); color: var(--accent-blue); }
  .badge-today { background: rgba(52,201,122,0.15); color: var(--accent-green); animation: pulse 2s infinite; }
  .badge-reported { background: rgba(255,255,255,0.06); color: var(--text-muted); }
  .badge-soon { background: rgba(245,166,35,0.15); color: var(--accent-amber); }

  .countdown { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.85rem; display: flex; align-items: center; gap: 5px; }
  .countdown-timer { font-size: 0.82rem; font-weight: 600; color: var(--accent-amber); letter-spacing: 0.03em; }
  .countdown-timer.soon { color: var(--accent-green); }
  .countdown-timer.past { color: var(--text-muted); }
  .date-line { font-size: 0.75rem; color: var(--text-secondary); }

  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 0.85rem; }
  .metric { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 7px 9px; }
  .metric-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .metric-value { font-size: 0.88rem; font-weight: 600; color: var(--text-primary); }
  .metric-value.positive { color: var(--accent-green); }
  .metric-value.negative { color: var(--accent-red); }

  .surprise-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.74rem; color: var(--text-secondary); padding: 7px 0 0; border-top: 1px solid var(--border); }
  .surprise-val { font-weight: 600; }
  .surprise-val.beat { color: var(--accent-green); }
  .surprise-val.miss { color: var(--accent-red); }

  .expand-btn { width: 100%; padding: 8px; background: rgba(255,255,255,0.03); border: none; border-top: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.73rem; color: var(--text-muted); font-family: inherit; transition: background 0.15s, color 0.15s; }

  .expand-icon { transition: transform 0.25s; font-size: 0.65rem; }

  .watch-section { overflow: hidden; max-height: 0; transition: max-height 0.35s ease; }
  .watch-section.open { max-height: 600px; }
  .watch-inner { padding: 1rem 1.2rem 1.1rem; background: rgba(0,0,0,0.25); }
  .watch-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent-blue); margin-bottom: 0.7rem; font-weight: 600; }
  .watch-item { display: flex; gap: 8px; margin-bottom: 0.55rem; font-size: 0.78rem; line-height: 1.5; }
  .watch-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  .dot-green { background: var(--accent-green); }
  .dot-red { background: var(--accent-red); }
  .dot-amber { background: var(--accent-amber); }
  .watch-label { font-weight: 500; color: var(--text-secondary); }
  .watch-text { color: var(--text-secondary); }
  .catalysts-section { margin-bottom: 0.8rem; }
  .risks-section { padding-top: 0.6rem; border-top: 1px solid var(--border); }

  .no-results { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.9rem; }

  .footer { text-align: center; padding: 2rem 1rem; font-size: 0.72rem; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 2rem; max-width: 1100px; margin-left: auto; margin-right: auto; }

  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.3rem; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .metrics-grid { grid-template-columns: repeat(3, 1fr); gap: 5px; }

function getDaysUntil(dateStr) {

  const diff = target - TODAY;
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function getCountdownText(dateStr) {
  const days = getDaysUntil(dateStr);
  if (days < 0) return { text: 'Reported', cls: 'past' };
  if (days === 0) return { text: 'TODAY', cls: 'soon' };
  if (days === 1) return { text: '1 day', cls: 'soon' };
  if (days <= 7) return { text: days + ' days', cls: 'soon' };
  return { text: days + ' days', cls: '' };
}

function isReported(dateStr) { return getDaysUntil(dateStr) < 0; }
function isSoon(dateStr) { const d = getDaysUntil(dateStr); return d >= 0 && d <= 7; }

function getBadge(company) {
  const days = getDaysUntil(company.date);
  if (days < 0) return '<span class="card-badge badge-reported">Reported</span>';
  if (days === 0) return '<span class="card-badge badge-today">Today</span>';
  if (days <= 7) return '<span class="card-badge badge-soon">Soon</span>';
  return '<span class="card-badge badge-upcoming">Upcoming</span>';
}

function getLogoHTML(company) {
  if (company.ticker === 'AAPL') {
    return `<div class="logo" style="background:${company.logoBg};">
      <svg viewBox="0 0 18 22" width="18" height="22" fill="${company.logoColor}">
        <path d="M15.2 11.5c0-2.4 1.3-4.5 3.2-5.7-1.2-1.7-3-2.8-5.1-2.9-.8-.1-2.4.5-3.3.5-.9 0-2.4-.5-3.1-.5C4.2 3 1.4 5.2.3 8.3c-1.3 3.5-.3 8.7 2.2 11.6.7.8 1.5 1.7 2.5 1.7s2-.7 3.2-.7c1.2 0 1.9.7 3.2.7s1.9-.9 2.6-1.7c.7-.9 1.1-1.9 1.4-2.9-2.1-.9-3.2-3-3.2-5.5zM11.5 1.3c.8-1 1.3-2.4 1.1-3.8-1.2.1-2.6.8-3.4 1.8-.8.9-1.4 2.3-1.2 3.6 1.3.1 2.7-.6 3.5-1.6z"/>
      </svg>
    </div>`;
  }
  if (company.ticker === 'MSFT') {
    return `<div class="logo" style="background:${company.logoBg};">
      <svg viewBox="0 0 21 21" width="20" height="20">
        <rect width="10" height="10" fill="#F35325"/><rect x="11" width="10" height="10" fill="#81BC06"/>
        <rect y="11" width="10" height="10" fill="#05A6F0"/><rect x="11" y="11" width="10" height="10" fill="#FFBA08"/>
      </svg>
    </div>`;
  }
  if (company.ticker === 'GOOGL') {
    return `<div class="logo" style="background:${company.logoBg};">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
    </div>`;
  }
  return `<div class="logo" style="background:${company.logoBg};color:${company.logoColor};font-size:0.9rem;">${company.logoText}</div>`;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function renderCalendar() {
  const container = document.getElementById('calendarContainer');
  let filtered = companies.filter(c => {
    if (activeFilter === 'April' && c.month !== 'April') return false;
    if (activeFilter === 'May' && c.month !== 'May') return false;
    if (activeFilter === 'upcoming' && isReported(c.date)) return false;
    if (activeFilter === 'reported' && !isReported(c.date)) return false;
    if (searchTerm && !c.name.toLowerCase().includes(searchTerm) && !c.ticker.toLowerCase().includes(searchTerm)) return false;
    return true;
  });

  filtered.sort((a,b) => new Date(a.date) - new Date(b.date));

  const upcomingCount = companies.filter(c => !isReported(c.date)).length;
  const reportedCount = companies.filter(c => isReported(c.date)).length;
  document.getElementById('upcomingCount').textContent = upcomingCount;
  document.getElementById('reportedCount').textContent = reportedCount;
  document.getElementById('totalCount').textContent = filtered.length;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No companies match your filter.</div>';
    return;
  }

  const months = [...new Set(filtered.map(c => c.month))];
  let html = '';

  for (const month of months) {
    const monthCompanies = filtered.filter(c => c.month === month);
    html += `<div class="month-section">
      <div class="section-label">${month} 2026 <span style="color:var(--text-muted)">&nbsp;·&nbsp;${monthCompanies.length} companies</span></div>
      <div class="cards-grid">`;

    for (const c of monthCompanies) {
      const ct = getCountdownText(c.date);
      const reported = isReported(c.date);
      const surpriseColor = c.lastSurprise.startsWith('+') ? 'beat' : 'miss';

      html += `<div class="earning-card ${reported ? 'reported' : ''}" id="card-${c.ticker}">
        <div class="card-main">
          <div class="card-top">
            <div class="company-info">
              ${getLogoHTML(c)}
              <div>
                <div class="company-name">${c.name}</div>
                <div class="company-ticker">${c.ticker} · ${c.sector}</div>
              </div>
            </div>
            ${getBadge(c)}
          </div>

          <div class="countdown">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none" style="flex-shrink:0"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M6 3.5v3l1.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            <span class="date-line">${formatDate(c.date)} · ${c.time}</span>
            &nbsp;·&nbsp;
            <span class="countdown-timer ${ct.cls}">${ct.text}</span>
          </div>

          <div class="metrics-grid">
            <div class="metric">
              <div class="metric-label">EPS Est.</div>
              <div class="metric-value">${c.epsEst}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Rev Est.</div>
              <div class="metric-value">${c.revEst}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Fwd P/E</div>
              <div class="metric-value">${c.forwardPE}</div>
            </div>
          </div>

          <div class="surprise-row">
            <span>Last quarter: <span style="color:var(--text-secondary)">${c.lastEPS}</span></span>
            <span>Surprise: <span class="surprise-val ${surpriseColor}">${c.lastSurprise}</span></span>
          </div>
        </div>

        <button class="expand-btn" id="btn-${c.ticker}" onclick="toggleWatch('${c.ticker}')">
          <svg class="expand-icon" width="10" height="10" viewBox="0 0 10 10"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg>
          What to Watch
        </button>

        <div class="watch-section" id="watch-${c.ticker}">
          <div class="watch-inner">
            <div class="catalysts-section">
              <div class="watch-title">Catalysts</div>
              ${c.catalysts.map(item => `
                <div class="watch-item">
                  <div class="watch-dot ${item.type === 'green' ? 'dot-green' : item.type === 'red' ? 'dot-red' : 'dot-amber'}"></div>
                  <div class="watch-text">${item.text}</div>
                </div>`).join('')}
            </div>
            <div class="risks-section">
              <div class="watch-title" style="color:#ff7070;">Risks & Concerns</div>
              ${c.risks.map(item => `
                <div class="watch-item">
                  <div class="watch-dot ${item.type === 'green' ? 'dot-green' : item.type === 'red' ? 'dot-red' : 'dot-amber'}"></div>
                  <div class="watch-text">${item.text}</div>
                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>`;
    }

    html += '</div></div>';
  }

  container.innerHTML = html;
}

function toggleWatch(ticker) {
  const section = document.getElementById('watch-' + ticker);
  const btn = document.getElementById('btn-' + ticker);
  const isOpen = section.classList.contains('open');
  section.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  btn.innerHTML = `
    <svg class="expand-icon ${!isOpen ? 'open' : ''}" width="10" height="10" viewBox="0 0 10 10" style="transform:${!isOpen ? 'rotate(180deg)' : 'none'};transition:transform 0.25s">
      <path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
    </svg>
    ${!isOpen ? 'Hide Details' : 'What to Watch'}
  `;
}

renderCalendar();
</script>
</body>
</html>
